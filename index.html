<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Getfetti — Beautiful Invites. Clearer RSVPs.</title>
    <meta name="description" content="The invite app that actually helps you host. Beautiful invites, clearer RSVPs, and a Host Brief that tells you exactly who is coming." />
    <meta property="og:title" content="Getfetti" />
    <meta property="og:description" content="Beautiful invites. Clearer RSVPs. Calmer hosting." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=1200&q=80" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🎉</text></svg>" />
    <style>
      .hero-image-container {
        width: 100%;
        max-height: 520px;
        overflow: hidden;
        border-radius: 16px;
        margin: 2rem auto;
        max-width: 900px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      }
      .hero-image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .hero-image-delightful-container {
        width: 100%;
        max-height: 600px;
        overflow: hidden;
        border-radius: 24px;
        margin: 2.5rem auto;
        max-width: 960px;
        box-shadow: 0 12px 60px rgba(255, 100, 130, 0.25), 0 4px 20px rgba(0,0,0,0.10);
        position: relative;
      }
      .hero-image-delightful-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.6s ease;
      }
      .hero-image-delightful-container:hover img {
        transform: scale(1.03);
      }
      .hero-image-delightful-container::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 24px;
        background: linear-gradient(
          to bottom,
          rgba(255, 220, 240, 0.10) 0%,
          rgba(255, 180, 100, 0.08) 50%,
          rgba(120, 80, 220, 0.18) 100%
        );
        pointer-events: none;
      }

      .hero-image-feature-container {
        width: 100%;
        max-height: 640px;
        overflow: hidden;
        border-radius: 32px;
        margin: 3rem auto;
        max-width: 1040px;
        box-shadow: 0 20px 80px rgba(255, 80, 160, 0.22), 0 6px 30px rgba(80, 40, 180, 0.14);
        position: relative;
      }
      .hero-image-feature-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .hero-image-feature-container:hover img {
        transform: scale(1.04);
      }
      .hero-image-feature-container::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 32px;
        background: linear-gradient(
          135deg,
          rgba(255, 200, 100, 0.12) 0%,
          rgba(255, 80, 140, 0.10) 40%,
          rgba(100, 60, 220, 0.20) 100%
        );
        pointer-events: none;
        z-index: 1;
      }
      .hero-image-feature-container::after {
        content: '🎉';
        position: absolute;
        top: 18px;
        right: 24px;
        font-size: 2.4rem;
        z-index: 2;
        filter: drop-shadow(0 2px 8px rgba(0,0,0,0.18));
        animation: floatEmoji 3s ease-in-out infinite;
      }
      @keyframes floatEmoji {
        0%, 100% { transform: translateY(0px) rotate(-5deg); }
        50% { transform: translateY(-10px) rotate(8deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="hero-image-container">
      <img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=1200&q=80" alt="Celebration party with confetti" />
    </div>
    <div class="hero-image-delightful-container">
      <img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=1400&q=85" alt="Joyful celebration with colorful balloons and confetti" />
    </div>
    <div class="hero-image-feature-container">
      <img src="https://images.unsplash.com/photo-1527529482837-4698179dc6ce?w=1400&q=85" alt="Delightful party gathering with friends celebrating together" />
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
